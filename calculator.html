<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <!-- Modern font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header class="app-topbar">
            <h1 class="app-title">Scientific</h1>
            <div class="controls">
                <button class="icon-btn theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
                    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" style="display: none;">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <button class="icon-btn history-toggle" id="history-toggle" aria-label="Toggle History">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                </button>
            </div>
        </header>

        <div class="main-content">
            <main class="calculator scientific">
                <div class="display" role="textbox" aria-label="Calculator Display">
                    <div class="previous-operand" id="previous-operand"></div>
                    <div class="current-operand" id="current-operand"></div>
                </div>

                <div class="mode-toggle">
                    <label>
                        <input type="radio" name="angleUnit" value="deg" checked> DEG
                    </label>
                    <label>
                        <input type="radio" name="angleUnit" value="rad"> RAD
                    </label>
                </div>

                <div class="keypad">
                    <!-- Row 1: Scientific Functions -->
                    <button class="operator science" data-action="function" data-val="sin("
                        aria-label="Sine">sin</button>
                    <button class="operator science" data-action="function" data-val="cos("
                        aria-label="Cosine">cos</button>
                    <button class="operator science" data-action="function" data-val="tan("
                        aria-label="Tangent">tan</button>
                    <button class="operator science" data-action="function" data-val="ln("
                        aria-label="Natural Log">ln</button>
                    <button class="operator science" data-action="function" data-val="log("
                        aria-label="Logarithm Base 10">log</button>

                    <!-- Row 2: Standard Scientific Math -->
                    <button class="operator science" data-action="constant" data-val="π" aria-label="Pi">π</button>
                    <button class="operator science" data-action="constant" data-val="e"
                        aria-label="Euler's Number">e</button>
                    <button class="operator science" data-action="operator" data-val="^" aria-label="Power">xʸ</button>
                    <button class="operator science" data-action="function" data-val="√("
                        aria-label="Square Root">√x</button>
                    <button class="operator science" data-action="operator" data-val="!"
                        aria-label="Factorial">n!</button>

                    <!-- Row 3: Structure -->
                    <button class="operator" data-action="append" data-val="(" aria-label="Open Parenthesis">(</button>
                    <button class="operator" data-action="append" data-val=")" aria-label="Close Parenthesis">)</button>
                    <button class="operator" data-action="append" data-val="%" aria-label="Percentage">%</button>
                    <button class="operator alert" data-action="clear-entry" aria-label="Clear Entry">CE</button>
                    <button class="operator alert" data-action="clear" aria-label="Clear All">AC</button>

                    <!-- Row 4: Numpad row 1 -->
                    <button class="number" data-number="7">7</button>
                    <button class="number" data-number="8">8</button>
                    <button class="number" data-number="9">9</button>
                    <button class="operator alert" data-action="delete" aria-label="Delete">DEL</button>
                    <button class="operator action" data-action="operator" data-val="/" aria-label="Divide">÷</button>

                    <!-- Row 5: Numpad row 2 -->
                    <button class="number" data-number="4">4</button>
                    <button class="number" data-number="5">5</button>
                    <button class="number" data-number="6">6</button>
                    <button class="operator action" data-action="operator" data-val="*" aria-label="Multiply">×</button>
                    <button class="operator action" data-action="operator" data-val="-" aria-label="Subtract">−</button>

                    <!-- Row 6: Bottom row -->
                    <button class="number" data-number="1">1</button>
                    <button class="number" data-number="2">2</button>
                    <button class="number" data-number="3">3</button>
                    <button class="operator action" data-action="operator" data-val="+" aria-label="Add">+</button>
                    <button class="equals" data-action="calculate" aria-label="Equals"
                        style="grid-row: span 2;">=</button>

                    <!-- Row 7: Lowest -->
                    <button class="number" data-number="0" style="grid-column: span 2;">0</button>
                    <button class="number" data-number=".">.</button>
                    <button class="operator science ans-btn" data-action="ans" aria-label="Previous Answer">Ans</button>

                </div>
            </main>

            <aside class="history-panel" id="history-panel">
                <div class="history-header">
                    <h2>History</h2>
                    <button class="icon-btn clear-history" id="clear-history" aria-label="Clear History"
                        title="Clear History">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                            </path>
                            <line x1="10" y1="11" x2="10" y2="17"></line>
                            <line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                    </button>
                </div>
                <div class="history-list" id="history-list">
                    <div class="history-empty">No history yet</div>
                </div>
            </aside>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
